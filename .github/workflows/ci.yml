name: CI

# Runs the backend test suite on every push and pull request. Building the
# Dockerfile's `test` stage runs `pytest` inside the image (RUN pytest), so a
# failing test fails the build — and CI fails before anything is deployed.
on:
  push:
  pull_request:

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run backend tests (Dockerfile `test` stage)
        run: docker build --target test ./backend
