version: "3.8"

services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rozetta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_to_a_strong_password}
      POSTGRES_DB: ${POSTGRES_DB:-rozetta_pms}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      target: dev
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Local dev convenience: enable the test login regardless of .env.
      # Production (DigitalOcean App Platform, .do/app.yaml) leaves this off.
      ENABLE_DEV_LOGIN: "true"
    depends_on:
      - db
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      target: dev
    restart: always
    ports:
      - "5173:5173"
    environment:
      # Shows the "Dev Login (Admin)" button in the local dev UI.
      VITE_ENABLE_DEV_LOGIN: "true"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
