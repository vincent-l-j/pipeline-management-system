# Serves the built SPA. /api routing + HTTPS are handled by the platform
# ingress (DigitalOcean App Platform), so this just needs SPA-fallback routing
# so React Router deep links (e.g. /pitches/42) don't 404 on refresh.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
