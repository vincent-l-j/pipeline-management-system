# Production stack: Postgres + FastAPI backend + Caddy (serves built SPA, proxies /api).
# Differs from the dev docker-compose.yml: no source bind-mounts, no --reload,
# DB/backend ports are NOT published (internal network only), Caddy fronts 80/443.
#
#   docker compose -f docker-compose.prod.yml up -d --build
#
services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rozetta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-rozetta_pms}
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      target: prod          # prod stage runs uvicorn without --reload and strips dev.py
    restart: always
    env_file:
      - .env
    depends_on:
      - db

  web:
    build:
      context: ./frontend
      target: prod
    restart: always
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS}
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    volumes:
      - caddy_data:/data       # persists TLS certs across restarts/redeploys
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
