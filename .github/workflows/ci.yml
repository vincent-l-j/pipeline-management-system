name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Backend tests
            service: backend
            target: test
          - name: Frontend build
            service: frontend
            target: build
          - name: Frontend tests
            service: frontend
            target: test
    steps:
      - uses: actions/checkout@v4

      - run: docker build --target ${{ matrix.target }} ./${{ matrix.service }}
